services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: hris-postgres-dev
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hris-network-dev

  # RabbitMQ Message Queue
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: hris-rabbitmq-dev
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
    ports:
      - "${RABBITMQ_AMQP_PORT:-5672}:5672"    # AMQP port
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"  # Management UI
    volumes:
      - rabbitmq_data_dev:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hris-network-dev

  # NestJS Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hris-backend-dev
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${PORT}
      PATH_URL: ${PATH_URL}

      # Database Configuration
      DB_TYPE: ${DB_TYPE}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}

      # JWT Configuration
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}

      # CORS Configuration
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}

      # Timezone
      OFFICE_TIMEZONE: ${OFFICE_TIMEZONE}
    ports:
      - "${PORT}:8000"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - hris-network-dev
    restart: unless-stopped

volumes:
  postgres_data_dev:
  rabbitmq_data_dev:

networks:
  hris-network-dev:
    driver: bridge
