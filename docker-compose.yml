services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: hris-postgres
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hris-network

  # NestJS Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hris-backend
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${PORT}
      PATH_URL: ${PATH_URL}
      
      # Database Configuration
      DB_TYPE: ${DB_TYPE}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      
      # JWT Configuration
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      
      # CORS Configuration
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      
      # Timezone
      OFFICE_TIMEZONE: ${OFFICE_TIMEZONE}
    ports:
      - "${PORT}:8000"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hris-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  hris-network:
    driver: bridge
